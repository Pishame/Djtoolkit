
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="theme-color" content="#1e1e1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DJ Toolkit Pro</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #1e1e1e;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-rail-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background-color: #ff0080;
            border-radius: 0 4px 4px 0;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }
        
        /* Splash Screen Animation */
        @keyframes logoPulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .splash-logo {
            animation: logoPulse 2s infinite ease-in-out;
        }
        .boot-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, rgba(255, 0, 128, 0.16), transparent 32%),
                linear-gradient(145deg, #0b0e14 0%, #141822 50%, #090b11 100%);
            color: #f8fafc;
        }
        .boot-card {
            width: min(26rem, calc(100vw - 2rem));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 2rem 1.75rem;
            background: rgba(9, 11, 17, 0.78);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(18px);
            text-align: center;
        }
        .boot-mark {
            width: 4.5rem;
            height: 4.5rem;
            margin: 0 auto 1.25rem;
            border-radius: 1.4rem;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #ff0080 0%, #7c3aed 100%);
            box-shadow: 0 18px 44px rgba(255, 0, 128, 0.32);
        }
        .boot-title {
            margin: 0;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.45em;
            text-transform: uppercase;
        }
        .boot-copy {
            margin: 0.85rem 0 0;
            color: rgba(226, 232, 240, 0.72);
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .boot-track {
            margin-top: 1.25rem;
            height: 0.35rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }
        .boot-track::after {
            content: '';
            display: block;
            width: 42%;
            height: 100%;
            background: linear-gradient(90deg, #ff0080 0%, #7c3aed 100%);
            border-radius: inherit;
            animation: bootSlide 1.8s ease-in-out infinite;
        }
        @keyframes bootSlide {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(320%); }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-screen overflow-hidden">
    <div id="root">
        <div class="boot-shell">
            <div class="boot-card">
                <div class="boot-mark">
                    <span class="material-symbols-outlined">graphic_eq</span>
                </div>
                <p class="boot-title">DJ Toolkit Pro</p>
                <div class="boot-track"></div>
                <p class="boot-copy">Launching studio interface...</p>
            </div>
        </div>
    </div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
